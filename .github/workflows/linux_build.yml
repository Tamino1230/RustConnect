name: Build Linux

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
            sudo apt-get update
            sudo apt-get install -y \
            pkg-config \
            libclang-dev \
            libxcb1-dev \
            libxrandr-dev \
            libdbus-1-dev \
            libpipewire-0.3-dev \
            libwayland-dev \
            libegl-dev \
            libgbm-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/App

      - name: Make build script executable
        run: chmod +x src/Build/linuxAppBuild.sh

      - name: Build RustConnect
        run: ./src/Build/linuxAppBuild.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RustConnect-Linux
          path: src/build/rustconnect