name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]
    paths-ignore:
        - "docs/**"
        - ".github/**"
        - "README.md"
        - "LICENSE"
jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build Docker image
      run: |
        docker build -f Dockerfile -t rust-connect-server:latest .